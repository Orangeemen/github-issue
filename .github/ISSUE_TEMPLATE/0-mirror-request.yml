name: 新镜像申请
description: 申请添加新的软件源镜像
title: "[Mirror Request]: "
labels: [new-mirror, pending]
body:
  - type: markdown
    attributes:
      value: |
        感谢提交镜像申请！请尽可能完整填写以下信息，帮助我们高效评估。
  - type: checkboxes
    id: checklist
    attributes:
      label: 📌 确认事项
      options:
        - label: 已搜索现有 issues，确认未重复申请
          required: true
        - label: 已阅读 [收录规则](./POLICY.md)
          required: true
        - label: 确认上游源允许再分发
          required: true

  - type: input
    id: project-name
    attributes:
      label: 项目名称
      description: 项目的官方全称
    validations:
      required: true

  - type: textarea
    id: project-intro
    attributes:
      label: 项目简介与必要性
      description: 简要说明项目与镜像的必要性
    validations:
      required: true

  - type: textarea
    id: upstream-url
    attributes:
      label: 上游源地址与镜像方式
    validations:
      required: true

  - type: input
    id: estimated-size
    attributes:
      label: 预估存储占用
      description: 如不确定可填"未知"，维护者会协助评估
      placeholder: e.g. ~50GB, <10GB, 未知


  - type: textarea
    id: other-mirrors
    attributes:
      label: 国内其他镜像站收录情况
      description: |
        如已知其他镜像站已收录，请列出

