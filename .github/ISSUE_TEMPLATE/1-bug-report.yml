name: 🐛 故障/问题报告
description: 报告镜像同步失败、访问异常、内容缺失或校验错误等问题
title: "[Bug]: "
labels: ["bug", "pending"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您报告问题！为帮助维护者快速定位，请尽可能提供详细信息。
        📌 提交前请确认：
        - [ ] 已搜索现有 Issues，确认未重复报告
        - [ ] 非临时性网络波动（建议等待 5-10 分钟后重试）

  - type: dropdown
    id: bug-type
    attributes:
      label: 问题类型
      options:
        - 🔁 同步失败/中断
        - 🔗 链接 404/无效
        - 🔍 内容缺失/版本滞后
        - 🛡️ 校验值不匹配 (Checksum mismatch)
        - ⚡ 访问异常 (限速/403/502等)
        - 📦 配置文件/索引错误
        - ❓ 其他
    validations:
      required: true

  - type: input
    id: mirror-name
    attributes:
      label: 涉及镜像/项目名称
      description: 出现问题的具体镜像路径或软件名
      placeholder: 例: debian, ubuntu, pypi, github-release/kubernetes
    validations:
      required: true

  - type: textarea
    id: reproduce-steps
    attributes:
      label: 复现步骤 / 访问方式
      description: 请提供具体的命令、URL 或操作步骤
      placeholder: |
        示例：
        1. 访问 https://mirrors.wonderfor.org/ubuntu/dists/jammy/...
        2. 执行 apt update
        3. 使用 wget 下载特定文件...
    validations:
      required: true

  - type: textarea
    id: error-log
    attributes:
      label: 错误日志 / 状态码
      description: 粘贴终端输出、浏览器网络面板信息或截图
      render: shell

  - type: textarea
    id: expected-behavior
    attributes:
      label: 预期行为
      description: 正常情况下应该返回什么结果？
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: 客户端环境
      description: OS、浏览器版本、同步工具及版本等
      placeholder: 例: Ubuntu 22.04, wget 1.21.3, Chrome 120

  - type: checkboxes
    id: checklist
    attributes:
      label: 确认事项
      options:
        - label: 我确认该问题非本地网络或代理导致
        - label: 我理解镜像同步可能存在数小时延迟，非实时一致
        - label: 我愿意配合维护者提供额外测试信息