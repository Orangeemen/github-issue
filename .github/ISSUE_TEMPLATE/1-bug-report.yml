name: 故障/问题报告
description: 报告镜像同步失败、访问异常、内容缺失等问题
title: "[Bug]: "
labels: ["bug", "pending"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您报告问题！为帮助维护者快速定位，请尽可能提供详细信息。

  - type: checkboxes
    id: checklist
    attributes:
      label: 确认事项
      options:
        - label: 我确认该问题非本地网络或代理导致
        - label: 我已确认非临时性网络波动（建议等待 5-10 分钟后重试）
        - label: 我已搜索现有 Issues，确认未重复报告

  - type: dropdown
    id: bug-type
    attributes:
      label: 问题类型
      options:
        - 官网网页异常
        - 内容缺失/版本滞后
        - 镜像源不可用
        - 其他
    validations:
      required: true

  - type: textarea
    id: bug-type-other
    attributes:
      label: 其他问题说明
      description: 仅当上方选择「其他」时填写，请详细描述您的问题
      placeholder: 
    validations:
      required: false

  - type: dropdown
    id: reproduce-frequency
    attributes:
      label: 复现频率
      description: |
        帮助维护者评估问题稳定性与排查优先级：
        - 必现：每次执行相同操作均触发
        - 高频：多次操作稳定出现（>50%）
        - 偶发：随机出现，可能受网络/缓存/时段影响
        - 仅一次/无法复现：提交后未再出现
        - 需特定条件：依赖特定地域/客户端/参数/版本等
      options:
        - 必现（每次操作均触发）
        - 高频（多次操作稳定复现）
        - 偶发/间歇性（随机出现）
        - 仅出现一次/无法复现
        - 需特定条件（特定时间/网络/版本/参数等）
    validations:
      required: true

  - type: input
    id: mirror-name
    attributes:
      label: 涉及镜像名称
      description: 出现问题的具体镜像路径或镜像名
      placeholder: "例: debian, ubuntu, pypi, github-release/microsoft_PowerToys"
    validations:
      required: true

  - type: textarea
    id: reproduce-steps
    attributes:
      label: 复现步骤 / 访问方式
      description: 请提供具体的命令、URL 或操作步骤
      placeholder: |
        示例：
        1. 访问 https://mirrors.wonderfor.org/ubuntu/dists/jammy/...
        2. 执行 apt update
        3. 使用 wget 下载特定文件...
    validations:
      required: true

  - type: textarea
    id: error-log
    attributes:
      label: 错误日志 / 状态码
      description: 粘贴终端输出、浏览器错误信息
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: 预期行为
      description: 正常情况下应该返回什么结果？


  - type: input
    id: environment
    attributes:
      label: 客户端环境
      description: OS、浏览器版本、同步工具及版本等
      placeholder: "例: Ubuntu 22.04, Chrome 120"
    validations:
      required: true
      
  - type: input
    id: anything-else
    attributes:
      label: 其他信息
      description: 其它想要提供的信息
